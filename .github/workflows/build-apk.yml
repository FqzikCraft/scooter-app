name: Build Flet APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install Flet CLI
        run: pip install flet-cli
      
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true
      
      - name: Set up Android SDK (используем предустановленную версию)
        run: |
          # Используем предустановленные cmdline-tools 12.0
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          export PATH=$PATH:$ANDROID_HOME/cmdline-tools/latest/bin:$ANDROID_HOME/platform-tools
          
          # Устанавливаем необходимые пакеты
          yes | sdkmanager "platform-tools" "platforms;android-34" "build-tools;34.0.0" "ndk;26.1.10909125" || true
      
      - name: Accept Android licenses
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          yes | flutter doctor --android-licenses || true
      
      - name: Build APK
        run: |
          export ANDROID_HOME=/usr/local/lib/android/sdk
          export ANDROID_SDK_ROOT=$ANDROID_HOME
          flet build apk --yes
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scooter-app-apk
          path: build/apk/app-release.apk
          retention-days: 7
